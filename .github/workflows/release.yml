name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # crear el release y subir assets
  packages: write   # publicar imágenes en GHCR

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser necesita el historial completo y los tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Release notes = the top (current) section of CHANGELOG.md, so the GitHub
      # release body is the well-defined, human-written changelog (not raw commits).
      - name: Extract release notes
        run: |
          awk '/^## \[/{n++; if(n==1) next} n==1{print} n>=2{exit}' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
