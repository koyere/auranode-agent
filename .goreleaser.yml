version: 2
project_name: auranode-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: auranode-agent
    main: ./cmd/auranode-agent
    binary: auranode-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux            # El agente solo corre en Linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    # amd64 -> auranode-agent_1.0.0_linux_amd64.tar.gz
    # arm64 -> auranode-agent_1.0.0_linux_arm64.tar.gz
    # armv7 -> auranode-agent_1.0.0_linux_armv7.tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ─── Imágenes Docker multi-arch en GHCR ───────────────────────────────────────
dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/koyere/auranode-agent:{{ .Version }}-amd64"
      - "ghcr.io/koyere/auranode-agent:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/koyere/auranode-agent"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/koyere/auranode-agent:{{ .Version }}-arm64"
      - "ghcr.io/koyere/auranode-agent:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/koyere/auranode-agent"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/koyere/auranode-agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/koyere/auranode-agent:{{ .Version }}-amd64"
      - "ghcr.io/koyere/auranode-agent:{{ .Version }}-arm64"
  - name_template: "ghcr.io/koyere/auranode-agent:latest"
    skip_push: auto   # no mover :latest en pre-releases
    image_templates:
      - "ghcr.io/koyere/auranode-agent:latest-amd64"
      - "ghcr.io/koyere/auranode-agent:latest-arm64"

release:
  draft: false
  prerelease: auto   # Los tags v1.0.0-beta.1 quedan como pre-release automáticamente

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^sync:"
